<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MangaRef v9</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f3f4f6; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    textarea { font-family: inherit; }
    textarea::placeholder { color: #9ca3af; }
    textarea:focus { outline: none; border-color: #e60023 !important; box-shadow: 0 0 0 3px #e6002318; }
    button:active { transform: scale(0.98); }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
    .dot1 { animation: bounce 1s ease-in-out infinite 0s; }
    .dot2 { animation: bounce 1s ease-in-out infinite 0.2s; }
    .dot3 { animation: bounce 1s ease-in-out infinite 0.4s; }
    .hist-item:hover { background: #fef2f2 !important; border-color: #e60023 !important; }
    .exemple-chip:hover { background: #e60023 !important; color: #fff !important; }
    .copy-btn:hover { background: #f3f4f6 !important; }
    @media (max-width: 768px) { .shortcut-hint { display: none !important; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;
    const pinterestUrl = (q) => `https://www.pinterest.com/search/pins/?q=${encodeURIComponent(q)}`;

    const T = {
      fr: {
        tagline: "Décris ta scène → trouve tes références Pinterest",
        sceneLabel: "Ta scène",
        placeholder: "Ex : Un mec qui reçoit un direct dans la mâchoire...",
        btnSearch: "📌 Trouver mes références",
        btnLoading: "⏳ Recherche en cours...",
        btnNew: "↺ Nouvelle recherche",
        shortcut: "⌘ + Entrée pour lancer",
        examplesTitle: "Exemples de scènes",
        historyTitle: "Recherches récentes",
        pinterestLabel: "Pinterest",
        drawLabel: "Illustration / Dessin",
        realLabel: "Photo réaliste",
        senseiLabel: "Conseil du Sensei",
        scenes: (n) => `${n} scène${n > 1 ? "s" : ""} analysée${n > 1 ? "s" : ""}`,
        errRetry: "Réessaie en décrivant mieux ta scène !",
        errConn: "Erreur de connexion, réessaie !",
        footer: "MangaRef v9 — Pour les artistes 🎌",
      },
      en: {
        tagline: "Describe your scene → find your Pinterest references",
        sceneLabel: "Your scene",
        placeholder: "Ex: A guy getting punched in the jaw...",
        btnSearch: "📌 Find my references",
        btnLoading: "⏳ Searching...",
        btnNew: "↺ New search",
        shortcut: "⌘ + Enter to search",
        examplesTitle: "Scene examples",
        historyTitle: "Recent searches",
        pinterestLabel: "Pinterest",
        drawLabel: "Illustration / Drawing",
        realLabel: "Realistic photo",
        senseiLabel: "Sensei's Tip",
        scenes: (n) => `${n} scene${n > 1 ? "s" : ""} analyzed`,
        errRetry: "Try describing your scene more precisely!",
        errConn: "Connection error, please try again!",
        footer: "MangaRef v9 — For artists 🎌",
      },
    };

    const EXEMPLES_FR = ["Un mec qui reçoit un coup de poing","Une fille qui pleure sous la pluie","Deux persos dos à dos","Un personnage qui tombe à genoux","Une main qui attrape un poignet","Un mec appuyé contre un mur"];
    const EXEMPLES_EN = ["A guy getting punched in the face","A girl crying in the rain","Two characters standing back to back","A character falling to their knees","A hand grabbing a wrist","A guy leaning against a wall"];
    const LOADING_MSGS_FR = ["Le Sensei consulte ses grimoires...","Analyse de la scène en cours...","Recherche des meilleures références...","Le Sensei affûte son pinceau...","Exploration des archives visuelles..."];
    const LOADING_MSGS_EN = ["The Sensei consults the archives...","Analyzing your scene...","Searching for the best references...","The Sensei sharpens his brush...","Exploring the visual database..."];

    const getCount = () => { try { return parseInt(localStorage.getItem("mangaref_count") || "0"); } catch { return 0; } };
    const incCount = () => { try { const n = getCount() + 1; localStorage.setItem("mangaref_count", n); return n; } catch { return 0; } };
    const getHistory = () => { try { return JSON.parse(localStorage.getItem("mangaref_history") || "[]"); } catch { return []; } };
    const addToHistory = (s) => { try { const h = getHistory().filter(x => x !== s).slice(0, 4); localStorage.setItem("mangaref_history", JSON.stringify([s, ...h])); } catch {} };

    const SYSTEM_FR = `Tu es MangaRef, un assistant expert qui aide les dessinateurs (manga, webtoon, comics, fanart) à trouver des références visuelles ultra-précises.

Quand un artiste décrit une scène, tu génères 2 requêtes Pinterest + un conseil technique.

═══ FORMULES PINTEREST TESTÉES ═══
- PINTEREST_DESSIN : "drawing manga of" + sujet + action + contexte. MAX 5 mots après "drawing manga of".
- PINTEREST_REALISTE : sujet + action + contexte. MAX 5 mots. Pas de "drawing", pas de "manga".

RÈGLE SCÈNE À 2 PERSONNAGES : décris UNIQUEMENT celui qui subit l'action.
INTERDIT : "MMA", "boxing", "martial arts", "comic panel", "manga style", "anime style"
INTERDIT : détails de pose, d'expression, de vêtement dans la requête.

═══ FORMAT DE RÉPONSE (STRICTEMENT) ═══
PINTEREST_DESSIN: [drawing manga of + MAX 5 mots]
PINTEREST_REALISTE: [MAX 5 mots, sans drawing, sans manga]
CONSEIL: [3-4 phrases en français, technique et précis]

═══ EXEMPLES ═══

Scène : "un mec qui se prend un direct dans la mâchoire"
PINTEREST_DESSIN: drawing manga of man punch jaw impact
PINTEREST_REALISTE: man hit face jaw punch slow motion
CONSEIL: Le moment du contact et la réaction sont deux dessins différents — choisis lequel tu veux montrer. Si c'est l'impact : la peau et la chair se déforment du côté du poing, les lèvres se retroussent. Si c'est la réaction : la tête part en rotation, l'épaule suit, le corps pivote. Ajoute de la sueur ou de la salive qui vole pour montrer la violence du choc. Un angle légèrement en contre-plongée rend le coup écrasant.

Scène : "un personnage qui dort sur une chaise"
PINTEREST_DESSIN: drawing manga of man sleeping chair
PINTEREST_REALISTE: man asleep on chair photo
CONSEIL: La chaise dicte la pose — selon qu'elle a des accoudoirs ou non, le corps s'y abandonne différemment. Sans accoudoir, les bras tombent librement et la tête part sur le côté ou en arrière. Observe la gravité : tout ce qui n'est pas soutenu s'affaisse. Le poids du corps crée des plis dans les vêtements aux points de contact avec la chaise.

Scène : "un personnage qui saute depuis un toit"
PINTEREST_DESSIN: drawing manga of character jumping rooftop
PINTEREST_REALISTE: person jumping rooftop edge photo
CONSEIL: Montre la poussée des jambes au moment du saut — les genoux se détendent, les orteils quittent le bord en dernier. En chute libre, les vêtements et les cheveux montent vers le haut (contre-intuitif mais juste). Pour la vitesse, étire légèrement les proportions verticalement. Le regard vers le bas avec les yeux écarquillés raconte la hauteur mieux que n'importe quel décor.`;

    const SYSTEM_EN = `You are MangaRef, an expert assistant helping artists (manga, webtoon, comics, fanart) find ultra-precise visual references.

When an artist describes a scene, generate 2 Pinterest queries + a technical tip.

═══ TESTED PINTEREST FORMULAS ═══
- PINTEREST_DESSIN: "drawing manga of" + subject + action + context. MAX 5 words after "drawing manga of".
- PINTEREST_REALISTE: subject + action + context. MAX 5 words. No "drawing", no "manga".

2-CHARACTER SCENE RULE: describe ONLY the one receiving the action.
FORBIDDEN: "MMA", "boxing", "martial arts", "comic panel", "manga style", "anime style"
FORBIDDEN: pose details, expressions, clothing in the query.

═══ RESPONSE FORMAT (STRICT) ═══
PINTEREST_DESSIN: [drawing manga of + MAX 5 words]
PINTEREST_REALISTE: [MAX 5 words, no drawing, no manga]
CONSEIL: [3-4 sentences in English, technical and precise]

═══ EXAMPLES ═══

Scene: "a guy getting punched in the jaw"
PINTEREST_DESSIN: drawing manga of man punch jaw impact
PINTEREST_REALISTE: man hit face jaw punch slow motion
CONSEIL: The moment of contact and the reaction are two different drawings — choose which one you want to show. For impact: flesh deforms toward the fist, lips curl back. For reaction: head rotates, shoulder follows, body pivots. Add flying sweat or saliva to convey the violence. A slight low-angle shot makes the punch feel crushing.

Scene: "a character sleeping on a chair"
PINTEREST_DESSIN: drawing manga of man sleeping chair
PINTEREST_REALISTE: man asleep on chair photo
CONSEIL: The chair dictates the pose — armrests or not completely changes how the body surrenders to it. Without armrests, arms fall freely and the head drops to the side or back. Study gravity: anything unsupported sags. Body weight creates fabric folds at every contact point with the chair.

Scene: "a character jumping from a rooftop"
PINTEREST_DESSIN: drawing manga of character jumping rooftop
PINTEREST_REALISTE: person jumping rooftop edge photo
CONSEIL: Show the leg push at the moment of jump — knees extend, toes leave the edge last. In freefall, clothes and hair rise upward (counterintuitive but accurate). For speed, stretch proportions slightly vertically. Eyes wide open looking down tells the height better than any background.`;

    function CopyButton({ text }) {
      const [copied, setCopied] = useState(false);
      const copy = (e) => { e.preventDefault(); e.stopPropagation(); navigator.clipboard?.writeText(text).then(() => { setCopied(true); setTimeout(() => setCopied(false), 1500); }); };
      return <button onClick={copy} className="copy-btn" style={{ background: "none", border: "1.5px solid #e5e7eb", borderRadius: 7, padding: "3px 8px", fontSize: 10, fontWeight: 700, color: copied ? "#16a34a" : "#9ca3af", cursor: "pointer", transition: "all 0.15s", flexShrink: 0 }}>{copied ? "✓ Copié" : "Copier"}</button>;
    }

    function LinkCard({ href, emoji, label, color, query }) {
      const [hov, setHov] = useState(false);
      return (
        <div style={{ marginBottom: 10 }}>
          <a href={href} target="_blank" rel="noopener noreferrer" onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
            style={{ display: "flex", alignItems: "center", gap: 14, padding: "16px 18px", background: hov ? `${color}08` : "#fff", border: `2px solid ${hov ? color : "#e5e7eb"}`, borderRadius: 14, textDecoration: "none", transition: "all 0.15s" }}>
            <div style={{ width: 44, height: 44, borderRadius: 11, background: hov ? color : `${color}18`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, flexShrink: 0, transition: "background 0.15s" }}>{emoji}</div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontWeight: 700, fontSize: 13, color: "#111827", marginBottom: 3 }}>{label}</div>
              <div style={{ fontSize: 11, color: "#9ca3af", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{query}</div>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <CopyButton text={query} />
              <div style={{ fontSize: 16, color: hov ? color : "#d1d5db", transition: "color 0.15s" }}>→</div>
            </div>
          </a>
        </div>
      );
    }

    function LoadingDots({ msg }) {
      return (
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 12, padding: "20px 0" }}>
          <div style={{ display: "flex", gap: 6 }}>{["dot1","dot2","dot3"].map(c => <div key={c} className={c} style={{ width: 8, height: 8, borderRadius: "50%", background: "#e60023" }} />)}</div>
          <p style={{ fontSize: 13, color: "#6b7280", fontStyle: "italic" }}>{msg}</p>
        </div>
      );
    }

    function MangaRef() {
      const [scene, setScene] = useState("");
      const [loading, setLoading] = useState(false);
      const [result, setResult] = useState(null);
      const [error, setError] = useState(null);
      const [count, setCount] = useState(getCount());
      const [history, setHistory] = useState(getHistory());
      const [lang, setLang] = useState("fr");
      const [loadMsg, setLoadMsg] = useState(LOADING_MSGS_FR[0]);

      const t = T[lang];
      const EXEMPLES = lang === "fr" ? EXEMPLES_FR : EXEMPLES_EN;
      const LOAD_MSGS = lang === "fr" ? LOADING_MSGS_FR : LOADING_MSGS_EN;
      const SYSTEM = lang === "fr" ? SYSTEM_FR : SYSTEM_EN;

      const parse = (text) => {
        const getLine = (label) => { const m = text.match(new RegExp(`${label}:\\s*([^\\n]+)`, "i")); return m ? m[1].trim() : ""; };
        const cm = text.match(/CONSEIL:\s*([\s\S]+)/i);
        return { dessin: getLine("PINTEREST_DESSIN"), realiste: getLine("PINTEREST_REALISTE"), conseil: cm ? cm[1].trim() : "" };
      };

      const search = async (sceneText) => {
        const q = (sceneText || scene).trim();
        if (!q || loading) return;
        setLoading(true); setResult(null); setError(null);
        setLoadMsg(LOAD_MSGS[Math.floor(Math.random() * LOAD_MSGS.length)]);
        try {
          const res = await fetch("/api/chat", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 300, system: SYSTEM, messages: [{ role: "user", content: `Scène : "${q}"` }] }) });
          const data = await res.json();
          const text = data.content?.map(b => b.text || "").join("") || "";
          const parsed = parse(text);
          if (!parsed.dessin) { setError(t.errRetry); }
          else { setResult(parsed); addToHistory(q); setHistory(getHistory()); setCount(incCount()); }
        } catch { setError(t.errConn); }
        finally { setLoading(false); }
      };

      const active = scene.trim() && !loading;

      return (
        <div style={{ minHeight: "100vh", background: "#f3f4f6", display: "flex", flexDirection: "column", alignItems: "center", padding: "40px 16px 80px" }}>

          <div style={{ marginBottom: 4, display: "flex", alignItems: "center", gap: 14 }}>
            <div style={{ display: "flex", alignItems: "baseline" }}>
              <span style={{ fontSize: 30, fontWeight: 900, color: "#e60023", letterSpacing: -1 }}>Manga</span>
              <span style={{ fontSize: 30, fontWeight: 900, color: "#111827", letterSpacing: -1 }}>Ref</span>
            </div>
            <button onClick={() => { setLang(l => l === "fr" ? "en" : "fr"); setResult(null); setScene(""); setError(null); }}
              style={{ background: "#fff", border: "1.5px solid #e5e7eb", borderRadius: 20, padding: "4px 10px", fontSize: 13, fontWeight: 700, cursor: "pointer", color: "#374151", display: "flex", alignItems: "center", gap: 5 }}>
              {lang === "fr" ? "🇬🇧 EN" : "🇫🇷 FR"}
            </button>
          </div>

          <p style={{ fontSize: 13, color: "#6b7280", marginBottom: count > 0 ? 8 : 28, textAlign: "center" }}>{t.tagline}</p>

          {count > 0 && (
            <div style={{ display: "inline-flex", alignItems: "center", gap: 6, background: "#fff", border: "1.5px solid #fecdd3", borderRadius: 20, padding: "4px 12px", marginBottom: 22 }}>
              <span>🎨</span><span style={{ fontSize: 11, fontWeight: 700, color: "#e60023" }}>{t.scenes(count)}</span>
            </div>
          )}

          <div style={{ width: "100%", maxWidth: 480, background: "#fff", borderRadius: 16, boxShadow: "0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.06)", padding: 22, marginBottom: 14 }}>
            <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: "#374151", marginBottom: 8, textTransform: "uppercase", letterSpacing: 0.6 }}>{t.sceneLabel}</label>
            <textarea value={scene} onChange={e => setScene(e.target.value)} onKeyDown={e => e.key === "Enter" && (e.metaKey || e.ctrlKey) && search()} placeholder={t.placeholder} rows={3}
              style={{ width: "100%", border: "2px solid #e5e7eb", borderRadius: 10, padding: "11px 13px", fontSize: 14, lineHeight: 1.6, resize: "none", color: "#111827", transition: "all 0.15s" }} />
            <div className="shortcut-hint" style={{ display: "flex", justifyContent: "flex-end", marginTop: 4, marginBottom: 10 }}>
              <span style={{ fontSize: 11, color: "#d1d5db" }}>{t.shortcut}</span>
            </div>
            <div style={{ marginBottom: 10 }}></div>
            <button onClick={() => search()} disabled={!active}
              style={{ width: "100%", padding: "13px", background: active ? "#e60023" : "#fecdd3", color: active ? "#fff" : "#fca5a5", border: "none", borderRadius: 10, fontSize: 14, fontWeight: 700, cursor: active ? "pointer" : "default", transition: "all 0.15s" }}>
              {loading ? t.btnLoading : t.btnSearch}
            </button>
          </div>

          {!result && !loading && (
            <div style={{ width: "100%", maxWidth: 480, marginBottom: 14 }}>
              <p style={{ fontSize: 10, fontWeight: 700, color: "#9ca3af", textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>{t.examplesTitle}</p>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>
                {EXEMPLES.map(ex => <button key={ex} onClick={() => { setScene(ex); setResult(null); setError(null); }} className="exemple-chip" style={{ background: "#fff", border: "1.5px solid #e5e7eb", borderRadius: 20, padding: "5px 12px", fontSize: 11, color: "#374151", cursor: "pointer", transition: "all 0.15s" }}>{ex}</button>)}
              </div>
            </div>
          )}

          {!result && !loading && history.length > 0 && (
            <div style={{ width: "100%", maxWidth: 480, marginBottom: 14 }}>
              <p style={{ fontSize: 10, fontWeight: 700, color: "#9ca3af", textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>{t.historyTitle}</p>
              {history.map((h, i) => <button key={i} onClick={() => { setScene(h); search(h); }} className="hist-item" style={{ display: "flex", alignItems: "center", gap: 10, width: "100%", background: "#fff", border: "1.5px solid #e5e7eb", borderRadius: 10, padding: "9px 13px", marginBottom: 6, fontSize: 12, color: "#374151", cursor: "pointer", textAlign: "left", transition: "all 0.15s" }}><span style={{ color: "#d1d5db" }}>↺</span>{h}</button>)}
            </div>
          )}

          {error && <div style={{ width: "100%", maxWidth: 480, padding: "13px 16px", background: "#fef2f2", border: "1.5px solid #fecaca", borderRadius: 10, marginBottom: 12 }}><p style={{ color: "#ef4444", fontSize: 13 }}>⚠️ {error}</p></div>}

          {loading && <div style={{ width: "100%", maxWidth: 480 }}><LoadingDots msg={loadMsg} /></div>}

          {result && !loading && (
            <div style={{ width: "100%", maxWidth: 480 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
                <div style={{ flex: 1, height: 1, background: "#e5e7eb" }} />
                <span style={{ fontSize: 10, fontWeight: 700, color: "#9ca3af", textTransform: "uppercase", letterSpacing: 1 }}>{t.pinterestLabel}</span>
                <div style={{ flex: 1, height: 1, background: "#e5e7eb" }} />
              </div>
              {result.dessin && <LinkCard href={pinterestUrl(result.dessin)} emoji="🎨" label={t.drawLabel} color="#e60023" query={result.dessin} />}
              {result.realiste && <LinkCard href={pinterestUrl(result.realiste)} emoji="📷" label={t.realLabel} color="#9f1239" query={result.realiste} />}
              {result.conseil && (
                <div style={{ background: "#fff", border: "1.5px solid #e5e7eb", borderLeft: "4px solid #e60023", borderRadius: 12, padding: "15px 17px", marginTop: 4 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 9 }}>
                    <span style={{ fontSize: 15 }}>🎌</span>
                    <span style={{ fontWeight: 700, fontSize: 11, color: "#374151", textTransform: "uppercase", letterSpacing: 0.8 }}>{t.senseiLabel}</span>
                  </div>
                  <p style={{ fontSize: 13.5, color: "#374151", lineHeight: 1.8 }}>{result.conseil}</p>
                </div>
              )}
              <div style={{ textAlign: "center", marginTop: 22 }}>
                <button onClick={() => { setResult(null); setScene(""); }} style={{ background: "none", border: "none", color: "#e60023", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>{t.btnNew}</button>
              </div>
            </div>
          )}

          <p style={{ marginTop: 48, fontSize: 11, color: "#d1d5db" }}>{t.footer}</p>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<MangaRef />);
  </script>
</body>
</html>
