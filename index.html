  <style>
    :root {
      --bg:#f3f4f6;--card:#fff;--border:#e5e7eb;
      --txt:#111827;--txt2:#374151;--txt3:#6b7280;--txt4:#9ca3af;
      --accent:#e60023;--accent2:#9f1239;
      --chip-bg:#fff;--chip-border:#e5e7eb;
      --hist-hover:#fef2f2;--inp-border:#e5e7eb;
      --modal-bg:rgba(0,0,0,0.45);
      --img-zone:#fff5f5;--img-zone-border:#fecaca;
    }
    .dark {
      --bg:#0f1117;--card:#1a1d27;--border:#2a2d3a;
      --txt:#f0f2ff;--txt2:#c8cce0;--txt3:#8890aa;--txt4:#555d75;
      --accent:#ff2d44;--accent2:#e60023;
      --chip-bg:#1e2130;--chip-border:#2a2d3a;

      --modal-bg:rgba(0,0,0,0.7);

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;transition:background .3s}
    textarea{font-family:inherit;background:var(--bg);color:var(--txt)}
    textarea::placeholder{color:var(--txt4)}
    textarea:focus{outline:none;border-color:var(--accent)!important;box-shadow:0 0 0 3px #e6002318}
    button:active{transform:scale(0.98)}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
    .dot1{animation:bounce 1s ease-in-out infinite 0s}
    .dot2{animation:bounce 1s ease-in-out infinite 0.2s}
    .dot3{animation:bounce 1s ease-in-out infinite 0.4s}
    .hist-item:hover{background:var(--hist-hover)!important;border-color:var(--accent)!important}
    .exemple-chip:hover{background:var(--accent)!important;color:#fff!important;border-color:var(--accent)!important}
    .copy-btn:hover{background:var(--border)!important}
    @media(max-width:768px){.shortcut-hint{display:none!important}}

    /* Zone textarea + icône image intégrée */
    .scene-input-wrap{position:relative;width:100%}
    .scene-textarea{
      width:100%;border:2px solid var(--inp-border);border-radius:10px;
      padding:11px 13px 38px 13px;
      font-size:14px;line-height:1.6;resize:none;
      color:var(--txt);background:var(--bg);
      font-family:inherit;transition:all .15s;
    }
    .scene-textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px #e6002318}
    .scene-textarea.has-img{border-color:var(--accent);border-width:2px}
    .scene-textarea::placeholder{color:var(--txt4)}
    .img-icon-btn{
      position:absolute;left:10px;bottom:10px;
      width:28px;height:28px;
      border:none;background:none;cursor:pointer;padding:0;
      display:flex;align-items:center;justify-content:center;
      color:var(--txt2);transition:color .15s;
      flex-shrink:0;
    }
    .img-icon-btn:hover{color:var(--txt)}
    .img-icon-btn.active{color:var(--txt)}
    .img-icon-badge{
      position:absolute;top:-4px;right:-4px;
      width:12px;height:12px;border-radius:50%;
      background:var(--accent);color:#fff;
      font-size:9px;font-weight:900;
      display:flex;align-items:center;justify-content:center;
      line-height:1;
    }
    .img-thumb-wrap{
      position:relative;width:100%;
      margin-bottom:10px;border-radius:10px;
      overflow:hidden;
    }
    .img-thumb{width:100%;max-height:160px;object-fit:contain;border-radius:10px;background:var(--border);display:block}
    .img-thumb-remove{
      position:absolute;top:6px;right:6px;
      width:26px;height:26px;border-radius:50%;
      background:rgba(0,0,0,0.65);color:#fff;border:none;
      cursor:pointer;font-size:14px;font-weight:700;
      display:flex;align-items:center;justify-content:center;
      line-height:1;
    }
    .img-thumb-remove:hover{background:rgba(0,0,0,0.85)}
    .desc-required{font-size:11px;color:var(--txt4);font-style:italic;margin-top:6px;padding-left:2px;}
    .dark .desc-required{color:var(--txt3);opacity:0.6}

    /* Bannière "ouvrir dans vrai navigateur" */
    .browser-banner{
      position:fixed;top:0;left:0;right:0;z-index:1000;
      background:#1a1d27;color:#fff;
      display:flex;align-items:center;justify-content:space-between;
      padding:7px 12px;gap:8px;
      box-shadow:0 2px 8px rgba(0,0,0,0.3);
      animation:slideDown .3s ease;
    }
    .browser-banner.off{display:none}
    @keyframes slideDown{from{transform:translateY(-100%)}to{transform:translateY(0)}}
    .browser-banner-left{display:flex;align-items:center;gap:7px;flex:1;min-width:0}
    .browser-banner-icon{font-size:16px;flex-shrink:0}
    .browser-banner-txt{font-size:10px;font-weight:700;line-height:1.3;color:#f0f2ff}
    .browser-banner-sub{font-size:9px;opacity:.6;margin-top:1px}
    .browser-banner-btn{background:var(--accent);color:#fff;border:none;border-radius:7px;padding:5px 10px;font-size:10px;font-weight:800;cursor:pointer;flex-shrink:0;white-space:nowrap}
    .browser-banner-close{background:none;border:none;color:rgba(255,255,255,0.5);font-size:16px;cursor:pointer;padding:0;line-height:1;flex-shrink:0}

    /* Bannière install PWA */
    .install-banner{position:fixed;top:0;left:0;right:0;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;z-index:999;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;box-shadow:0 2px 12px rgba(230,0,35,0.3);animation:slideDown .3s ease}
    .install-banner.off{display:none}
    .install-banner-left{display:flex;align-items:center;gap:10px}
    .install-icon{width:36px;height:36px;border-radius:9px;background:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:var(--accent);flex-shrink:0}
    .install-txt{font-size:12px;font-weight:600;line-height:1.4}
    .install-sub{font-size:10px;opacity:.75}
    .install-btn{background:#fff;color:var(--accent);border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:800;cursor:pointer;flex-shrink:0}
    .install-close{background:none;border:none;color:rgba(255,255,255,0.7);font-size:18px;cursor:pointer;padding:0 0 0 10px;line-height:1}

    /* Modal */
    .modal-overlay{position:fixed;inset:0;background:var(--modal-bg);z-index:800;display:flex;align-items:flex-end;justify-content:center}
    .modal-overlay.off{display:none}
    .modal-sheet{background:var(--card);border-radius:20px 20px 0 0;padding:20px 18px 40px;width:100%;max-width:480px}
    .modal-title{font-size:15px;font-weight:800;color:var(--txt);margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .setting-row{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid var(--border)}
    .setting-row:last-child{border-bottom:none}
    .setting-lbl{font-size:14px;font-weight:600;color:var(--txt2)}
    .setting-sub{font-size:11px;color:var(--txt4);margin-top:2px}
    .toggle{width:44px;height:24px;border-radius:12px;background:var(--border);border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
    .toggle.on{background:var(--accent)}
    .toggle::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s}
    .toggle.on::after{left:23px}

    /* Toast */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 20px;border-radius:40px;font-size:13px;font-weight:700;z-index:9000;opacity:0;transition:opacity .3s;white-space:nowrap}
    .toast.show{opacity:1}

    /* FAB settings */
    .settings-fab{position:fixed;bottom:20px;right:16px;width:42px;height:42px;border-radius:50%;background:var(--card);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,0.1);z-index:100}
    .search-btn-inner{display:flex;align-items:center;justify-content:center;gap:8px}
    .img-badge{background:rgba(255,255,255,0.25);border-radius:6px;padding:2px 7px;font-size:10px;font-weight:700}

<body>

<div class="toast" id="toast"></div>

<!-- Bannière navigateur Instagram/Facebook -->
<div class="browser-banner off" id="browser-banner">

<div class="install-banner off" id="install-banner">

  </div>

<button class="settings-fab" onclick="openModal()">⚙️</button>
<div id="root"></div>

<script>
// ── Détection navigateur intégré (Instagram / Facebook / TikTok) ──────
(function(){
  var ua = navigator.userAgent || "";
  var isInAppBrowser = /Instagram|FBAN|FBAV|FB_IAB|TikTok|BytedanceWebview/i.test(ua);
  if (!isInAppBrowser) return;

  try { if(localStorage.getItem("mr_browser_dismissed")) return; } catch{}

  var isIOS = /iPhone|iPad|iPod/i.test(ua);
  var lang = "en";
  try { lang = localStorage.getItem("mangaref_lang") || "en"; } catch{}
  var isFr = lang === "fr";

  var banner = document.getElementById("browser-banner");
  var icon = document.getElementById("browser-icon");
  var txt = document.getElementById("browser-txt");
  var sub = document.getElementById("browser-sub");
  var btn = document.getElementById("browser-btn");

  if (isIOS) {
    icon.textContent = "🧭";
    txt.textContent = isFr ? "Ouvre dans Safari pour installer l'app" : "Open in Safari to install the app";
    sub.textContent = isFr ? "Appuie sur ··· puis \"Ouvrir dans Safari\"" : "Tap ··· then \"Open in Safari\"";
    btn.textContent = isFr ? "Copier le lien" : "Copy link";
  } else {
    icon.textContent = "🌐";
    txt.textContent = isFr ? "Ouvre dans Chrome pour installer l'app" : "Open in Chrome to install the app";
    sub.textContent = isFr ? "Appuie sur ··· puis \"Ouvrir dans Chrome\"" : "Tap ··· then \"Open in Chrome\"";
    btn.textContent = isFr ? "Copier le lien" : "Copy link";
  }

  banner.classList.remove("off");

  document.getElementById("browser-close").addEventListener("click", function(){
    banner.classList.add("off");
    try { localStorage.setItem("mr_browser_dismissed","1"); } catch{}
  });
})();

function copyAndOpenBrowser(){
  var url = window.location.href;
  if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(function(){
      showToast("🔗 Lien copié ! Colle-le dans Chrome ou Safari");
    });
  } else {
    showToast("🔗 " + url);
  }
}

// ── Dark mode ─────────────────────────────────────────────────────────
function getDark(){try{return localStorage.getItem("mr_dark")==="1";}catch{return false;}}
function applyDark(d){
  document.getElementById("html-root").classList.toggle("dark",d);
  document.getElementById("theme-meta").content=d?"#0f1117":"#e60023";
}
function toggleDark(){
  var d=!getDark();
  try{localStorage.setItem("mr_dark",d?"1":"0");}catch{}
  applyDark(d);
  document.getElementById("tog-dark").classList.toggle("on",d);
}
applyDark(getDark());

function openModal(){
  document.getElementById("modal-overlay").classList.remove("off");
  document.getElementById("tog-dark").classList.toggle("on",getDark());
}
document.addEventListener("DOMContentLoaded",function(){
  document.getElementById("modal-overlay").addEventListener("click",function(e){
    if(e.target===document.getElementById("modal-overlay"))
      document.getElementById("modal-overlay").classList.add("off");
  });
});

function showToast(msg){
  var t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(function(){t.classList.remove("show");},3000);
}
window.showToast = showToast;

var deferredPrompt=null;
window.addEventListener("beforeinstallprompt",function(e){
  e.preventDefault();deferredPrompt=e;
  try{if(localStorage.getItem("mr_install_dismissed"))return;}catch{}
  setTimeout(function(){document.getElementById("install-banner").classList.remove("off");},2000);
});
function triggerInstall(){
  document.getElementById("modal-overlay").classList.add("off");
  if(deferredPrompt){
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(function(r){
      if(r.outcome==="accepted")showToast("🎌 MangaRef installé !");
      deferredPrompt=null;
      document.getElementById("install-banner").classList.add("off");
    });
  }else{showToast("💡 Menu Chrome ⋮ → Installer l'application");}
}
document.addEventListener("DOMContentLoaded",function(){
  document.getElementById("install-btn").addEventListener("click",triggerInstall);
  document.getElementById("install-close").addEventListener("click",function(){
    document.getElementById("install-banner").classList.add("off");
    try{localStorage.setItem("mr_install_dismissed","1");}catch{}
  });
});
window.addEventListener("appinstalled",function(){
  document.getElementById("install-banner").classList.add("off");
  showToast("🎌 MangaRef installé !");
});
if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js").catch(function(){});}
</script>

PINTEREST_DESSIN: drawing manga of wrist grab two characters
PINTEREST_REALISTE: wrist grab held two people
CONSEIL: La main qui saisit se referme depuis l'extérieur du poignet — le pouce côté paume. La tension narrative vient du contraste entre la main crispée du saisisseur et le bras figé de celui qui subit.`;

  const SYSTEM_EN = `You are MangaRef, an expert assistant helping artists (manga, webtoon, comics, fanart) find ultra-precise visual references.

When an artist describes a scene (text only or text + sketch), generate 2 Pinterest queries + a technical tip.

If an image is provided: first analyze the visible scene (poses, actions, relationship between characters), then combine with the text description to generate precise queries. If the sketch is rough or incomplete, rely mainly on the text description.

═══ TESTED PINTEREST FORMULAS ═══
- PINTEREST_DESSIN: "drawing manga of" + subject + action + context. MAX 5 words after "drawing manga of".
- PINTEREST_REALISTE: subject + action + context. MAX 5 words. No "drawing", no "manga".

VOCABULARY RULE (CRITICAL):
- ALWAYS use "man" or "woman". NEVER "person", "character", "figure", "someone".
- ALWAYS start with "drawing manga of".

2-CHARACTER SCENE RULE:
- Always add "two characters" in the query.
- Describe the GLOBAL SCENE, not separate actions.

BANNED WORDS: "MMA", "boxing", "martial arts", "comic panel", "manga style", "anime style", "webtoon", "lift", "block", "person", "character", "figure", "someone"
FORBIDDEN: pose details, expressions, clothing in the query.

═══ RESPONSE FORMAT (STRICT) ═══
PINTEREST_DESSIN: [drawing manga of + MAX 5 words]
PINTEREST_REALISTE: [MAX 5 words, no drawing, no manga]
CONSEIL: [2 sentences maximum in English, technical and precise]`;

  const getLang = () => { try { return localStorage.getItem("mangaref_lang") || "en"; } catch { return "en"; } };
  const saveLang = (l) => { try { localStorage.setItem("mangaref_lang", l); } catch {} };
  const getHistory = () => { try { return JSON.parse(localStorage.getItem("mangaref_history") || "[]"); } catch { return []; } };
  const addToHistory = (s) => { try { const h = getHistory().filter(x => x !== s).slice(0, 4); localStorage.setItem("mangaref_history", JSON.stringify([s, ...h])); } catch {} };

  const compressImage = (file) => new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const MAX = 600;
      let { width, height } = img;
      if (width > MAX || height > MAX) {
        if (width > height) { height = Math.round(height * MAX / width); width = MAX; }
        else { width = Math.round(width * MAX / height); height = MAX; }
      }
      const canvas = document.createElement("canvas");
      canvas.width = width; canvas.height = height;
      canvas.getContext("2d").drawImage(img, 0, 0, width, height);
      URL.revokeObjectURL(url);
      canvas.toBlob(blob => {
        if (!blob) { reject(new Error("Compression failed")); return; }
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(",")[1]);
        reader.onerror = () => reject(new Error("Read failed"));
        reader.readAsDataURL(blob);
      }, "image/jpeg", 0.55);
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error("Load failed")); };
    img.src = url;
  });

  function CopyButton({ text }) {
    const [copied, setCopied] = useState(false);
    const copy = (e) => { e.preventDefault(); e.stopPropagation(); navigator.clipboard?.writeText(text).then(() => { setCopied(true); setTimeout(() => setCopied(false), 1500); }); };
    return <button onClick={copy} className="copy-btn" style={{ background: "none", border: "1.5px solid var(--border)", borderRadius: 7, padding: "3px 8px", fontSize: 10, fontWeight: 700, color: copied ? "#16a34a" : "var(--txt4)", cursor: "pointer", transition: "all 0.15s", flexShrink: 0 }}>{copied ? "✓ Copié" : "Copier"}</button>;
  }

  function LinkCard({ href, emoji, label, color, query }) {
    const [hov, setHov] = useState(false);
    return (
      <div style={{ marginBottom: 10 }}>
        <a href={href} target="_blank" rel="noopener noreferrer" onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
          style={{ display: "flex", alignItems: "center", gap: 14, padding: "16px 18px", background: hov ? `${color}12` : "var(--card)", border: `2px solid ${hov ? color : "var(--border)"}`, borderRadius: 14, textDecoration: "none", transition: "all 0.15s" }}>
          <div style={{ width: 44, height: 44, borderRadius: 11, background: hov ? color : `${color}18`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, flexShrink: 0, transition: "background 0.15s" }}>{emoji}</div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontWeight: 700, fontSize: 13, color: "var(--txt)", marginBottom: 3 }}>{label}</div>
            <div style={{ fontSize: 11, color: "var(--txt4)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{query}</div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <CopyButton text={query} />
            <div style={{ fontSize: 16, color: hov ? color : "var(--border)", transition: "color 0.15s" }}>→</div>
          </div>
        </a>
      </div>
    );
  }

  function LoadingDots({ msg }) {
    return (
      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 12, padding: "20px 0" }}>
        <div style={{ display: "flex", gap: 6 }}>{["dot1","dot2","dot3"].map(c => <div key={c} className={c} style={{ width: 8, height: 8, borderRadius: "50%", background: "var(--accent)" }} />)}</div>
        <p style={{ fontSize: 13, color: "var(--txt3)", fontStyle: "italic" }}>{msg}</p>
      </div>
    );
  }

  function ShareButton({ t }) {
    const [copied, setCopied] = useState(false);
    const share = () => { navigator.clipboard?.writeText(window.location.origin).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); }); };
    return <button onClick={share} style={{ background: "none", border: "none", fontSize: 11, color: copied ? "var(--accent)" : "var(--txt4)", cursor: "pointer", fontWeight: copied ? 700 : 400, transition: "all 0.15s" }}>{copied ? t.shareCopied : t.share}</button>;
  }

  function ImageZone({ t, image, setImage, imagePreview, setImagePreview, scene, setScene, showDescRequired, hasImage, lang }) {
    const inputRef = useRef(null);

    const handleFile = (file) => {
      if (!file) return;
      if (!file.type.startsWith("image/")) { window.showToast("❌ Fichier non supporté"); return; }
      if (file.size > 8 * 1024 * 1024) { window.showToast("❌ Image trop lourde (max 8 Mo)"); return; }
      setImage(file);
      setImagePreview(URL.createObjectURL(file));
    };

    return (
      <div>
        <input ref={inputRef} type="file" accept="image/*" style={{ display: "none" }} onChange={e => handleFile(e.target.files[0])} />

        {/* Image preview en haut */}
        {hasImage && (
          <div className="img-thumb-wrap">
            <img src={imagePreview} alt="preview" className="img-thumb" />
            <button className="img-thumb-remove" onClick={() => { setImage(null); setImagePreview(null); }}>×</button>
          </div>
        )}

        {/* Label scène */}
        <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: "var(--txt2)", marginBottom: 8, textTransform: "uppercase", letterSpacing: 0.6 }}>
          {lang === "fr" ? "Ta scène" : "Your scene"} <span style={{ color: "var(--accent)" }}>*</span>
        </label>

        {/* Textarea avec icône image à gauche */}
        <div className="scene-input-wrap">
          <button
            className={`img-icon-btn${hasImage ? " active" : ""}`}
            onClick={() => inputRef.current?.click()}
            title={lang === "fr" ? "Ajouter un croquis" : "Add a sketch"}
            style={{ position: "absolute", left: 10, bottom: 10 }}
          >
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="3"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <path d="M21 15l-5-5L5 21"/>
            </svg>
            <div className="img-icon-badge">+</div>
          </button>
          <textarea
            className={`scene-textarea${hasImage ? " has-img" : ""}`}
            value={scene}
            onChange={e => setScene(e.target.value)}
            placeholder={hasImage ? t.placeholderWithImg : t.placeholder}
            rows={3}
          />
        </div>

        {/* Hint discret si image sans description */}
        {showDescRequired && (
          <div className="desc-required">{t.imgRequired}</div>
        )}
      </div>
    );
  }

  function MangaRef() {
    const [scene, setScene] = useState("");
    const [loading, setLoading] = useState(false);
    const [result, setResult] = useState(null);
    const [error, setError] = useState(null);
    const [history, setHistory] = useState(getHistory());
    const [lang, setLang] = useState(getLang());
    const [loadMsg, setLoadMsg] = useState(LOADING_MSGS_FR[0]);
    const [image, setImage] = useState(null);
    const [imagePreview, setImagePreview] = useState(null);

    const t = T[lang];
    const EXEMPLES = lang === "fr" ? EXEMPLES_FR : EXEMPLES_EN;
    const LOAD_MSGS = lang === "fr" ? LOADING_MSGS_FR : LOADING_MSGS_EN;
    const LOAD_MSGS_IMG = lang === "fr" ? LOADING_MSGS_IMG_FR : LOADING_MSGS_IMG_EN;
    const SYSTEM = lang === "fr" ? SYSTEM_FR : SYSTEM_EN;
    const hasImage = !!image;
    const canSearch = !loading && scene.trim().length > 0;
    const showDescRequired = hasImage && scene.trim().length === 0;

    const parse = (text) => {
      const getLine = (label) => { const m = text.match(new RegExp(`${label}:\\s*([^\\n]+)`, "i")); return m ? m[1].trim() : ""; };
      const cm = text.match(/CONSEIL:\s*([\s\S]+)/i);
      return { dessin: getLine("PINTEREST_DESSIN"), realiste: getLine("PINTEREST_REALISTE"), conseil: cm ? cm[1].trim() : "" };
    };

    const reset = () => { setResult(null); setScene(""); setError(null); setImage(null); setImagePreview(null); window.scrollTo({ top: 0, behavior: "smooth" }); };

    const search = async (sceneText) => {
      const q = (sceneText || scene).trim();
      if (!q || loading) return;
      setLoading(true); setResult(null); setError(null);
      const msgs = hasImage ? LOAD_MSGS_IMG : LOAD_MSGS;
      setLoadMsg(msgs[Math.floor(Math.random() * msgs.length)]);

      try {
        let finalUserMessage = `Scène : "${q}"`;

        // ── Étape 1 : Opus analyse l'image si présente ────────────────
        if (hasImage) {
          let base64;
          try { base64 = await compressImage(image); }
          catch { setError(t.errImg); setLoading(false); return; }

          const visionPrompt = lang === "fr"
            ? `Décris ce croquis en 3-4 phrases factuelles et précises. Couvre OBLIGATOIREMENT ces 4 points dans l'ordre :
1. POSE GLOBALE : debout / assis / accroupi / couché / agenouillé / en saut / en course
2. ANGLE DE VUE : de face / de profil (gauche/droit) / de dos / 3/4 face / 3/4 dos / contre-plongée / plongée
3. BRAS ET MAINS : position exacte (tendus en avant / sur les côtés / levés / croisés / le long du corps) + ce qu'ils font (saisir / pointer / tenir / lâcher / vide)
4. JAMBES ET CENTRE DE GRAVITÉ : poids sur quelle jambe, jambes écartées ou serrées, penché en avant/arrière

Sois précis et neutre, ne suppose AUCUN contexte narratif (pas de "combat", "action", "drama"). Format : juste les descriptions, sans préambule ni numérotation.`
            : `Describe this sketch in 3-4 precise factual sentences. MUST cover these 4 points in order:
1. GLOBAL POSE: standing / sitting / crouching / lying / kneeling / jumping / running
2. VIEW ANGLE: front view / profile (left/right) / back / 3/4 front / 3/4 back / low angle / high angle
3. ARMS AND HANDS: exact position (extended forward / sides / raised / crossed / along body) + what they're doing (grabbing / pointing / holding / releasing / empty)
4. LEGS AND CENTER OF GRAVITY: weight on which leg, legs apart or together, leaning forward/backward

Be precise and neutral, do NOT assume any narrative context (no "fighting", "action", "drama"). Format: just descriptions, no preamble or numbering.`;

          const visionRes = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-opus-4-7",
              max_tokens: 350,
              messages: [{
                role: "user",
                content: [
                  { type: "image", source: { type: "base64", media_type: "image/jpeg", data: base64 } },
                  { type: "text", text: visionPrompt }
                ]
              }]
            })
          });

          if (!visionRes.ok) {
            setError(visionRes.status === 413 ? t.errImg : t.errConn);
            setLoading(false); return;
          }

          const visionData = await visionRes.json();
          const imageDescription = visionData.content?.map(b => b.text || "").join("").trim() || "";

          // On passe la description visuelle à Sonnet
          finalUserMessage = lang === "fr"
            ? `Description du croquis fourni par l'utilisateur (analyse visuelle) :\n${imageDescription}\n\nDemande de l'utilisateur : "${q}"\n\nGénère les requêtes Pinterest en te basant principalement sur la description visuelle factuelle ci-dessus.`
            : `User's sketch description (visual analysis):\n${imageDescription}\n\nUser request: "${q}"\n\nGenerate Pinterest queries based primarily on the factual visual description above.`;
        }

        // ── Étape 2 : Sonnet génère les requêtes Pinterest ────────────
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-6",
            max_tokens: 400,
            system: SYSTEM,
            messages: [{ role: "user", content: finalUserMessage }]
          })
        });

        if (!res.ok) { setError(res.status === 413 ? t.errImg : t.errConn); setLoading(false); return; }
        const data = await res.json();
        const text = data.content?.map(b => b.text || "").join("") || "";
        const parsed = parse(text);
        if (!parsed.dessin) { setError(t.errRetry); }
        else { setResult(parsed); addToHistory(q); setHistory(getHistory()); }
      } catch { setError(t.errConn); }
      finally { setLoading(false); }
    };

    return (
      <div style={{ minHeight: "100vh", background: "var(--bg)", display: "flex", flexDirection: "column", alignItems: "center", padding: "56px 16px 100px" }}>
        <div style={{ marginBottom: 4, display: "flex", alignItems: "center", gap: 14 }}>
          <div onClick={reset} style={{ display: "flex", alignItems: "baseline", cursor: "pointer" }}>
            <span style={{ fontSize: 30, fontWeight: 900, color: "var(--accent)", letterSpacing: -1 }}>Manga</span>
            <span style={{ fontSize: 30, fontWeight: 900, color: "var(--txt)", letterSpacing: -1 }}>Ref</span>
          </div>
          <button onClick={() => { const nl = lang === "fr" ? "en" : "fr"; setLang(nl); saveLang(nl); setResult(null); setScene(""); setError(null); }}
            style={{ background: "var(--card)", border: "1.5px solid var(--border)", borderRadius: 20, padding: "4px 10px", fontSize: 13, fontWeight: 700, cursor: "pointer", color: "var(--txt2)", display: "flex", alignItems: "center", gap: 5 }}>
            {lang === "fr" ? "🇬🇧 EN" : "🇫🇷 FR"}
          </button>
        </div>
        <p style={{ fontSize: 13, color: "var(--txt3)", marginBottom: 28, textAlign: "center" }}>{t.tagline}</p>

        <div style={{ width: "100%", maxWidth: 480, background: "var(--card)", borderRadius: 16, boxShadow: "0 1px 3px rgba(0,0,0,0.06),0 4px 16px rgba(0,0,0,0.06)", padding: 22, marginBottom: 14 }}>

          <ImageZone
            t={t} image={image} setImage={setImage}
            imagePreview={imagePreview} setImagePreview={setImagePreview}
            scene={scene} setScene={setScene}
            showDescRequired={showDescRequired} hasImage={hasImage} lang={lang}
          />

          <div className="shortcut-hint" style={{ display: "flex", justifyContent: "flex-end", marginTop: 4, marginBottom: 10 }}>
            <span style={{ fontSize: 11, color: "var(--txt4)" }}>{t.shortcut}</span>
          </div>
          <button onClick={() => search()} disabled={!canSearch}
            style={{ width: "100%", padding: "13px", background: canSearch ? "var(--accent)" : "#fecdd3", color: canSearch ? "#fff" : "#fca5a5", border: "none", borderRadius: 10, fontSize: 14, fontWeight: 700, cursor: canSearch ? "pointer" : "default", transition: "all 0.15s" }}>
            {loading ? t.btnLoading : hasImage ? t.btnSearchImg : t.btnSearch}
          </button>
        </div>

        {!result && !loading && !hasImage && (
          <div style={{ width: "100%", maxWidth: 480, marginBottom: 14 }}>
            <p style={{ fontSize: 10, fontWeight: 700, color: "var(--txt4)", textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>{t.examplesTitle}</p>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>
              {EXEMPLES.map(ex => <button key={ex} onClick={() => { setScene(ex); setResult(null); setError(null); }} className="exemple-chip" style={{ background: "var(--chip-bg)", border: `1.5px solid var(--chip-border)`, borderRadius: 20, padding: "5px 12px", fontSize: 11, color: "var(--txt2)", cursor: "pointer", transition: "all 0.15s" }}>{ex}</button>)}
            </div>
          </div>
        )}

        {!result && !loading && history.length > 0 && (
          <div style={{ width: "100%", maxWidth: 480, marginBottom: 14 }}>
            <p style={{ fontSize: 10, fontWeight: 700, color: "var(--txt4)", textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>{t.historyTitle}</p>
            {history.map((h, i) => <button key={i} onClick={() => { setScene(h); search(h); }} className="hist-item" style={{ display: "flex", alignItems: "center", gap: 10, width: "100%", background: "var(--card)", border: `1.5px solid var(--border)`, borderRadius: 10, padding: "9px 13px", marginBottom: 6, fontSize: 12, color: "var(--txt2)", cursor: "pointer", textAlign: "left", transition: "all 0.15s" }}><span style={{ color: "var(--txt4)" }}>↺</span>{h}</button>)}
          </div>
        )}

        {error && <div style={{ width: "100%", maxWidth: 480, padding: "13px 16px", background: "var(--hist-hover)", border: "1.5px solid #fecaca", borderRadius: 10, marginBottom: 12 }}><p style={{ color: "#ef4444", fontSize: 13 }}>⚠️ {error}</p></div>}
        {loading && <div style={{ width: "100%", maxWidth: 480 }}><LoadingDots msg={loadMsg} /></div>}

        {result && !loading && (
          <div style={{ width: "100%", maxWidth: 480 }}>
            {hasImage && (
              <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 12, padding: "7px 12px", background: "var(--img-zone)", border: "1.5px solid var(--img-zone-border)", borderRadius: 9 }}>
                <span style={{ fontSize: 13 }}>🎨</span>
                <span style={{ fontSize: 11, color: "var(--txt3)", fontWeight: 600 }}>{lang === "fr" ? "Résultat basé sur ton croquis + description" : "Result based on your sketch + description"}</span>
              </div>
            )}
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
              <div style={{ flex: 1, height: 1, background: "var(--border)" }} />
              <span style={{ fontSize: 10, fontWeight: 700, color: "var(--txt4)", textTransform: "uppercase", letterSpacing: 1 }}>{t.pinterestLabel}</span>
              <div style={{ flex: 1, height: 1, background: "var(--border)" }} />
            </div>
            {result.dessin && <LinkCard href={pinterestUrl(result.dessin)} emoji="🎨" label={t.drawLabel} color="#e60023" query={result.dessin} />}
            {result.realiste && <LinkCard href={pinterestUrl(result.realiste)} emoji="📷" label={t.realLabel} color="#9f1239" query={result.realiste} />}
            {result.conseil && (
              <div style={{ background: "var(--card)", border: `1.5px solid var(--border)`, borderLeft: "4px solid var(--accent)", borderRadius: 12, padding: "15px 17px", marginTop: 4 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 9 }}>
                  <span style={{ fontSize: 15 }}>🎌</span>
                  <span style={{ fontWeight: 700, fontSize: 11, color: "var(--txt2)", textTransform: "uppercase", letterSpacing: 0.8 }}>{t.senseiLabel}</span>
                </div>
                <p style={{ fontSize: 13.5, color: "var(--txt2)", lineHeight: 1.8 }}>{result.conseil}</p>
              </div>
            )}
            <div style={{ textAlign: "center", marginTop: 22 }}>
              <button onClick={reset} style={{ background: "none", border: "none", color: "var(--accent)", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>{t.btnNew}</button>
            </div>
          </div>
        )}

        <div style={{ marginTop: 48, display: "flex", flexDirection: "column", alignItems: "center", gap: 8 }}>
          <ShareButton t={t} />
          <p style={{ fontSize: 11, color: "var(--txt4)" }}>{t.footer}</p>
        </div>
      </div>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<MangaRef />);
</script>
</body>
</html>
