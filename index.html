    :root {
      --bg:#f3f4f6;--card:#fff;--border:#e5e7eb;
      --txt:#111827;--txt2:#374151;--txt3:#6b7280;--txt4:#9ca3af;
      --accent:#e60023;--accent2:#9f1239;
      --chip-bg:#fff;--chip-border:#e5e7eb;
      --hist-hover:#fef2f2;--inp-border:#e5e7eb;
      --modal-bg:rgba(0,0,0,0.45);
      --img-zone:#fff5f5;--img-zone-border:#fecaca;
    }
    .dark {
      --bg:#0f1117;--card:#1a1d27;--border:#2a2d3a;
      --txt:#f0f2ff;--txt2:#c8cce0;--txt3:#8890aa;--txt4:#555d75;
      --accent:#ff2d44;--accent2:#e60023;
      --chip-bg:#1e2130;--chip-border:#2a2d3a;
      --hist-hover:#1f1520;--inp-border:#2a2d3a;
      --modal-bg:rgba(0,0,0,0.7);
      --img-zone:#1f1520;--img-zone-border:#3a1a20;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;transition:background .3s}
    textarea{font-family:inherit;background:var(--bg);color:var(--txt)}
    textarea::placeholder{color:var(--txt4)}
    textarea:focus{outline:none;border-color:var(--accent)!important;box-shadow:0 0 0 3px #e6002318}
    button:active{transform:scale(0.98)}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
    .dot1{animation:bounce 1s ease-in-out infinite 0s}
    .dot2{animation:bounce 1s ease-in-out infinite 0.2s}
    .dot3{animation:bounce 1s ease-in-out infinite 0.4s}
    .hist-item:hover{background:var(--hist-hover)!important;border-color:var(--accent)!important}
    .exemple-chip:hover{background:var(--accent)!important;color:#fff!important;border-color:var(--accent)!important}
    .copy-btn:hover{background:var(--border)!important}
    @media(max-width:768px){.shortcut-hint{display:none!important}}

    /* Zone image */
    .img-dropzone{
      width:100%;border:2px dashed var(--img-zone-border);border-radius:12px;
      background:var(--img-zone);cursor:pointer;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:7px;padding:18px;transition:all .2s;position:relative;
      min-height:90px;
    }
    .img-dropzone:hover,.img-dropzone.drag{border-color:var(--accent);background:#fef2f2}
    .dark .img-dropzone:hover,.dark .img-dropzone.drag{background:#2a1020}
    .img-dropzone-txt{font-size:12px;font-weight:600;color:var(--txt3);text-align:center}
    .img-dropzone-sub{font-size:10px;color:var(--txt4);text-align:center}
    .img-preview-wrap{position:relative;width:100%;border-radius:10px;overflow:hidden;margin-top:4px}
    .img-preview{width:100%;max-height:200px;object-fit:contain;border-radius:10px;background:var(--border);display:block}
    .img-remove{position:absolute;top:6px;right:6px;width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,0.6);color:#fff;border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;font-weight:700}
    /* Hint description discret */
    .desc-required{
      font-size:11px;color:var(--txt2);font-style:italic;
      opacity:0.65;margin-top:4px;padding-left:2px;
    }
    .dark .desc-required{opacity:0.5}

    /* Bannière install */
    .install-banner{position:fixed;top:0;left:0;right:0;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;z-index:999;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;box-shadow:0 2px 12px rgba(230,0,35,0.3);animation:slideDown .3s ease}
    @keyframes slideDown{from{transform:translateY(-100%)}to{transform:translateY(0)}}
    .install-banner.off{display:none}
    .install-banner-left{display:flex;align-items:center;gap:10px}
    .install-icon{width:36px;height:36px;border-radius:9px;background:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:var(--accent);flex-shrink:0}
    .install-txt{font-size:12px;font-weight:600;line-height:1.4}
    .install-sub{font-size:10px;opacity:.75}
    .install-btn{background:#fff;color:var(--accent);border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:800;cursor:pointer;flex-shrink:0}
    .install-close{background:none;border:none;color:rgba(255,255,255,0.7);font-size:18px;cursor:pointer;padding:0 0 0 10px;line-height:1}

    /* Modal */
    .modal-overlay{position:fixed;inset:0;background:var(--modal-bg);z-index:800;display:flex;align-items:flex-end;justify-content:center}
    .modal-overlay.off{display:none}
    .modal-sheet{background:var(--card);border-radius:20px 20px 0 0;padding:20px 18px 40px;width:100%;max-width:480px}
    .modal-title{font-size:15px;font-weight:800;color:var(--txt);margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .setting-row{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid var(--border)}
    .setting-row:last-child{border-bottom:none}
    .setting-lbl{font-size:14px;font-weight:600;color:var(--txt2)}
    .setting-sub{font-size:11px;color:var(--txt4);margin-top:2px}
    .toggle{width:44px;height:24px;border-radius:12px;background:var(--border);border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
    .toggle.on{background:var(--accent)}
    .toggle::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s}
    .toggle.on::after{left:23px}

    /* Toast */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 20px;border-radius:40px;font-size:13px;font-weight:700;z-index:9000;opacity:0;transition:opacity .3s;white-space:nowrap}
    .toast.show{opacity:1}

    /* FAB settings */
    .settings-fab{position:fixed;bottom:20px;right:16px;width:42px;height:42px;border-radius:50%;background:var(--card);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,0.1);z-index:100}

    /* Badge "image" sur le bouton recherche */
    .search-btn-inner{display:flex;align-items:center;justify-content:center;gap:8px}
    .img-badge{background:rgba(255,255,255,0.25);border-radius:6px;padding:2px 7px;font-size:10px;font-weight:700}
  </style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- Bannière installation -->
<div class="install-banner off" id="install-banner">
  <div class="install-banner-left">
    <div class="install-icon">MR</div>
    <div>
      <div class="install-txt">Installer MangaRef</div>
      <div class="install-sub">Accès rapide depuis ton écran d'accueil</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:4px">
    <button class="install-btn" id="install-btn">Installer</button>
    <button class="install-close" id="install-close">×</button>
  </div>
</div>

<!-- Modal Paramètres -->
<div class="modal-overlay off" id="modal-overlay">
  <div class="modal-sheet">
    <p class="modal-title">⚙️ Paramètres</p>
    <div class="setting-row">
      <div><p class="setting-lbl">🌙 Thème sombre</p><p class="setting-sub">Moins fatiguant la nuit</p></div>
      <button class="toggle" id="tog-dark" onclick="toggleDark()"></button>
    </div>
    <div class="setting-row">
      <div><p class="setting-lbl">📲 Installer l'app</p><p class="setting-sub">Ajouter à l'écran d'accueil</p></div>
      <button style="background:var(--accent);color:#fff;border:none;border-radius:9px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer" onclick="triggerInstall()">Installer</button>
    </div>
  </div>
</div>

<!-- Bouton paramètres -->
<button class="settings-fab" onclick="openModal()">⚙️</button>

<div id="root"></div>

<script>
function getDark(){try{return localStorage.getItem("mr_dark")==="1";}catch{return false;}}
function applyDark(d){
  document.getElementById("html-root").classList.toggle("dark",d);
  document.getElementById("theme-meta").content=d?"#0f1117":"#e60023";
}
function toggleDark(){
  var d=!getDark();
  try{localStorage.setItem("mr_dark",d?"1":"0");}catch{}
  applyDark(d);
  document.getElementById("tog-dark").classList.toggle("on",d);
}
applyDark(getDark());

function openModal(){
  document.getElementById("modal-overlay").classList.remove("off");
  document.getElementById("tog-dark").classList.toggle("on",getDark());
}
document.addEventListener("DOMContentLoaded",function(){
  document.getElementById("modal-overlay").addEventListener("click",function(e){
    if(e.target===document.getElementById("modal-overlay"))
      document.getElementById("modal-overlay").classList.add("off");
  });
});

function showToast(msg){
  var t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(function(){t.classList.remove("show");},2500);
}

var deferredPrompt=null;
window.addEventListener("beforeinstallprompt",function(e){
  e.preventDefault();deferredPrompt=e;
  try{if(localStorage.getItem("mr_install_dismissed"))return;}catch{}
  setTimeout(function(){document.getElementById("install-banner").classList.remove("off");},2000);
});
function triggerInstall(){
  document.getElementById("modal-overlay").classList.add("off");
  if(deferredPrompt){
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(function(r){
      if(r.outcome==="accepted")showToast("🎌 MangaRef installé !");
      deferredPrompt=null;
      document.getElementById("install-banner").classList.add("off");
    });
  }else{showToast("💡 Menu Chrome ⋮ → Installer l'application");}
}
document.addEventListener("DOMContentLoaded",function(){
  document.getElementById("install-btn").addEventListener("click",triggerInstall);
  document.getElementById("install-close").addEventListener("click",function(){
    document.getElementById("install-banner").classList.add("off");
    try{localStorage.setItem("mr_install_dismissed","1");}catch{}
  });
});
window.addEventListener("appinstalled",function(){
  document.getElementById("install-banner").classList.add("off");
  showToast("🎌 MangaRef installé !");
});
if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js").catch(function(){});}
</script>

    return (
      <button onClick={share} style={{ background: "none", border: "none", fontSize: 11, color: copied ? "var(--accent)" : "var(--txt4)", cursor: "pointer", fontWeight: copied ? 700 : 400, transition: "all 0.15s" }}>
        {copied ? t.shareCopied : t.share}
      </button>
    );
  }

  // ── Zone d'upload image ───────────────────────────────────────────────
  function ImageZone({ t, image, setImage, imagePreview, setImagePreview }) {
    const inputRef = useRef(null);
    const [drag, setDrag] = useState(false);

    const handleFile = (file) => {
      if (!file) return;
      if (!file.type.startsWith("image/")) { window.showToast && window.showToast("❌ Fichier non supporté"); return; }
      if (file.size > 5 * 1024 * 1024) { window.showToast && window.showToast("❌ Image trop lourde (max 5 Mo)"); return; }
      setImage(file);
      const url = URL.createObjectURL(file);
      setImagePreview(url);
    };

    const onDrop = (e) => { e.preventDefault(); setDrag(false); handleFile(e.dataTransfer.files[0]); };
    const onDragOver = (e) => { e.preventDefault(); setDrag(true); };
    const onDragLeave = () => setDrag(false);

    if (imagePreview) {
      return (
        <div className="img-preview-wrap">
          <img src={imagePreview} alt="preview" className="img-preview" />
          <button className="img-remove" onClick={() => { setImage(null); setImagePreview(null); }}>×</button>
        </div>
      );
    }

    return (
      <div
        className={`img-dropzone${drag ? " drag" : ""}`}
        onClick={() => inputRef.current?.click()}
        onDrop={onDrop}
        onDragOver={onDragOver}
        onDragLeave={onDragLeave}
      >
        <input ref={inputRef} type="file" accept="image/*" style={{ display: "none" }} onChange={e => handleFile(e.target.files[0])} />
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        <p className="img-dropzone-txt">{t.imgZoneTxt}</p>
        <p className="img-dropzone-sub">{t.imgZoneSub}</p>
      </div>
    );
  }

  function MangaRef() {
    const [scene, setScene] = useState("");
    const [loading, setLoading] = useState(false);
    const [result, setResult] = useState(null);
    const [error, setError] = useState(null);
    const [history, setHistory] = useState(getHistory());
    const [lang, setLang] = useState(getLang());
    const [loadMsg, setLoadMsg] = useState(LOADING_MSGS_FR[0]);
    const [image, setImage] = useState(null);
    const [imagePreview, setImagePreview] = useState(null);

    const t = T[lang];
    const EXEMPLES = lang === "fr" ? EXEMPLES_FR : EXEMPLES_EN;
    const LOAD_MSGS = lang === "fr" ? LOADING_MSGS_FR : LOADING_MSGS_EN;
    const LOAD_MSGS_IMG = lang === "fr" ? LOADING_MSGS_IMG_FR : LOADING_MSGS_IMG_EN;
    const SYSTEM = lang === "fr" ? SYSTEM_FR : SYSTEM_EN;

    const hasImage = !!image;
    // Si image : description obligatoire. Si pas d'image : scène obligatoire
    const canSearch = !loading && (hasImage ? scene.trim().length > 0 : scene.trim().length > 0);
    const showDescRequired = hasImage && scene.trim().length === 0;

    const parse = (text) => {
      const getLine = (label) => { const m = text.match(new RegExp(`${label}:\\s*([^\\n]+)`, "i")); return m ? m[1].trim() : ""; };
      const cm = text.match(/CONSEIL:\s*([\s\S]+)/i);
      return { dessin: getLine("PINTEREST_DESSIN"), realiste: getLine("PINTEREST_REALISTE"), conseil: cm ? cm[1].trim() : "" };
    };

    const reset = () => { setResult(null); setScene(""); setError(null); setImage(null); setImagePreview(null); window.scrollTo({ top: 0, behavior: "smooth" }); };

    const search = async (sceneText) => {
      const q = (sceneText || scene).trim();
      if (!q || loading) return;
      if (hasImage && !q) { setError(t.errDesc); return; }

      setLoading(true); setResult(null); setError(null);

      // Message de chargement selon mode
      const msgs = hasImage ? LOAD_MSGS_IMG : LOAD_MSGS;
      setLoadMsg(msgs[Math.floor(Math.random() * msgs.length)]);

      try {
        let messages;

        if (hasImage) {
          // Mode image + texte — on encode l'image en base64
          const base64 = await toBase64(image);
          const mediaType = image.type || "image/jpeg";
          messages = [{
            role: "user",
            content: [
              { type: "image", source: { type: "base64", media_type: mediaType, data: base64 } },
              { type: "text", text: `Scène : "${q}"\n\nAnalyse ce croquis et génère les requêtes Pinterest adaptées.` }
            ]
          }];
        } else {
          // Mode texte seul
          messages = [{ role: "user", content: `Scène : "${q}"` }];
        }

        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 400, system: SYSTEM, messages })
        });
        const data = await res.json();
        const text = data.content?.map(b => b.text || "").join("") || "";
        const parsed = parse(text);
        if (!parsed.dessin) { setError(t.errRetry); }
        else { setResult(parsed); addToHistory(q); setHistory(getHistory()); }
      } catch { setError(t.errConn); }
      finally { setLoading(false); }
    };

    return (
      <div style={{ minHeight: "100vh", background: "var(--bg)", display: "flex", flexDirection: "column", alignItems: "center", padding: "56px 16px 100px" }}>

        {/* Header */}
        <div style={{ marginBottom: 4, display: "flex", alignItems: "center", gap: 14 }}>
          <div onClick={reset} style={{ display: "flex", alignItems: "baseline", cursor: "pointer" }}>
            <span style={{ fontSize: 30, fontWeight: 900, color: "var(--accent)", letterSpacing: -1 }}>Manga</span>
            <span style={{ fontSize: 30, fontWeight: 900, color: "var(--txt)", letterSpacing: -1 }}>Ref</span>
          </div>
          <button onClick={() => { const nl = lang === "fr" ? "en" : "fr"; setLang(nl); saveLang(nl); setResult(null); setScene(""); setError(null); }}
            style={{ background: "var(--card)", border: "1.5px solid var(--border)", borderRadius: 20, padding: "4px 10px", fontSize: 13, fontWeight: 700, cursor: "pointer", color: "var(--txt2)", display: "flex", alignItems: "center", gap: 5 }}>
            {lang === "fr" ? "🇬🇧 EN" : "🇫🇷 FR"}
          </button>
        </div>

        <p style={{ fontSize: 13, color: "var(--txt3)", marginBottom: 28, textAlign: "center" }}>{t.tagline}</p>

        {/* Card principale */}
        <div style={{ width: "100%", maxWidth: 480, background: "var(--card)", borderRadius: 16, boxShadow: "0 1px 3px rgba(0,0,0,0.06),0 4px 16px rgba(0,0,0,0.06)", padding: 22, marginBottom: 14 }}>

          {/* Zone image */}
          <div style={{ marginBottom: 14 }}>
            <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: "var(--txt2)", marginBottom: 8, textTransform: "uppercase", letterSpacing: 0.6 }}>
              🖼️ {lang === "fr" ? "Croquis / Référence" : "Sketch / Reference"} <span style={{ color: "var(--txt4)", fontWeight: 400, textTransform: "none" }}>— {lang === "fr" ? "optionnel" : "optional"}</span>
            </label>
            <ImageZone t={t} image={image} setImage={setImage} imagePreview={imagePreview} setImagePreview={setImagePreview} />
          </div>

          {/* Alerte description obligatoire si image uploadée */}
          {hasImage && (
            <div className="desc-required">{t.imgRequired}</div>
          )}

          {/* Textarea description */}
          <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: "var(--txt2)", margin: "14px 0 8px", textTransform: "uppercase", letterSpacing: 0.6 }}>
            {lang === "fr" ? "Ta scène" : "Your scene"} {hasImage && <span style={{ color: "var(--accent)" }}>*</span>}
          </label>
          <textarea
            value={scene}
            onChange={e => setScene(e.target.value)}
            onKeyDown={e => e.key === "Enter" && (e.metaKey || e.ctrlKey) && canSearch && search()}
            placeholder={hasImage ? t.placeholderWithImg : t.placeholder}
            rows={hasImage ? 2 : 3}
            style={{ width: "100%", border: `2px solid ${showDescRequired ? "var(--accent)" : "var(--inp-border)"}`, borderRadius: 10, padding: "11px 13px", fontSize: 14, lineHeight: 1.6, resize: "none", color: "var(--txt)", background: "var(--bg)", transition: "all 0.15s" }}
          />

          <div className="shortcut-hint" style={{ display: "flex", justifyContent: "flex-end", marginTop: 4, marginBottom: 10 }}>
            <span style={{ fontSize: 11, color: "var(--txt4)" }}>{t.shortcut}</span>
          </div>

          {/* Bouton recherche */}
          <button
            onClick={() => search()}
            disabled={!canSearch}
            style={{ width: "100%", padding: "13px", background: canSearch ? "var(--accent)" : "#fecdd3", color: canSearch ? "#fff" : "#fca5a5", border: "none", borderRadius: 10, fontSize: 14, fontWeight: 700, cursor: canSearch ? "pointer" : "default", transition: "all 0.15s" }}
          >
            {loading ? t.btnLoading : hasImage ? t.btnSearchImg : t.btnSearch}
          </button>
        </div>

        {/* Exemples */}
        {!result && !loading && !hasImage && (
          <div style={{ width: "100%", maxWidth: 480, marginBottom: 14 }}>
            <p style={{ fontSize: 10, fontWeight: 700, color: "var(--txt4)", textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>{t.examplesTitle}</p>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>
              {EXEMPLES.map(ex => <button key={ex} onClick={() => { setScene(ex); setResult(null); setError(null); }} className="exemple-chip" style={{ background: "var(--chip-bg)", border: `1.5px solid var(--chip-border)`, borderRadius: 20, padding: "5px 12px", fontSize: 11, color: "var(--txt2)", cursor: "pointer", transition: "all 0.15s" }}>{ex}</button>)}
            </div>
          </div>
        )}

        {/* Historique */}
        {!result && !loading && history.length > 0 && (
          <div style={{ width: "100%", maxWidth: 480, marginBottom: 14 }}>
            <p style={{ fontSize: 10, fontWeight: 700, color: "var(--txt4)", textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>{t.historyTitle}</p>
            {history.map((h, i) => <button key={i} onClick={() => { setScene(h); search(h); }} className="hist-item" style={{ display: "flex", alignItems: "center", gap: 10, width: "100%", background: "var(--card)", border: `1.5px solid var(--border)`, borderRadius: 10, padding: "9px 13px", marginBottom: 6, fontSize: 12, color: "var(--txt2)", cursor: "pointer", textAlign: "left", transition: "all 0.15s" }}><span style={{ color: "var(--txt4)" }}>↺</span>{h}</button>)}
          </div>
        )}

        {error && <div style={{ width: "100%", maxWidth: 480, padding: "13px 16px", background: "var(--hist-hover)", border: "1.5px solid #fecaca", borderRadius: 10, marginBottom: 12 }}><p style={{ color: "#ef4444", fontSize: 13 }}>⚠️ {error}</p></div>}
        {loading && <div style={{ width: "100%", maxWidth: 480 }}><LoadingDots msg={loadMsg} /></div>}

        {/* Résultats */}
        {result && !loading && (
          <div style={{ width: "100%", maxWidth: 480 }}>
            {/* Badge image utilisée */}
            {hasImage && (
              <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 12, padding: "7px 12px", background: "var(--img-zone)", border: "1.5px solid var(--img-zone-border)", borderRadius: 9 }}>
                <span style={{ fontSize: 13 }}>🎨</span>
                <span style={{ fontSize: 11, color: "var(--txt3)", fontWeight: 600 }}>{lang === "fr" ? "Résultat basé sur ton croquis + description" : "Result based on your sketch + description"}</span>
              </div>
            )}
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
              <div style={{ flex: 1, height: 1, background: "var(--border)" }} />
              <span style={{ fontSize: 10, fontWeight: 700, color: "var(--txt4)", textTransform: "uppercase", letterSpacing: 1 }}>{t.pinterestLabel}</span>
              <div style={{ flex: 1, height: 1, background: "var(--border)" }} />
            </div>
            {result.dessin && <LinkCard href={pinterestUrl(result.dessin)} emoji="🎨" label={t.drawLabel} color="#e60023" query={result.dessin} />}
            {result.realiste && <LinkCard href={pinterestUrl(result.realiste)} emoji="📷" label={t.realLabel} color="#9f1239" query={result.realiste} />}
            {result.conseil && (
              <div style={{ background: "var(--card)", border: `1.5px solid var(--border)`, borderLeft: "4px solid var(--accent)", borderRadius: 12, padding: "15px 17px", marginTop: 4 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 9 }}>
                  <span style={{ fontSize: 15 }}>🎌</span>
                  <span style={{ fontWeight: 700, fontSize: 11, color: "var(--txt2)", textTransform: "uppercase", letterSpacing: 0.8 }}>{t.senseiLabel}</span>
                </div>
                <p style={{ fontSize: 13.5, color: "var(--txt2)", lineHeight: 1.8 }}>{result.conseil}</p>
              </div>
            )}
            <div style={{ textAlign: "center", marginTop: 22 }}>
              <button onClick={reset} style={{ background: "none", border: "none", color: "var(--accent)", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>{t.btnNew}</button>
            </div>
          </div>
        )}

        <div style={{ marginTop: 48, display: "flex", flexDirection: "column", alignItems: "center", gap: 8 }}>
          <ShareButton t={t} />
          <p style={{ fontSize: 11, color: "var(--txt4)" }}>{t.footer}</p>
        </div>
      </div>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<MangaRef />);
</script>
</body>
</html>
